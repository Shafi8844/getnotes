#
# CI/CD pipeline for GetNotes.
#
# Triggers on every push to main, plus manual runs from the Actions tab.
#
# What it does:
#   1. CI job: install deps, run a smoke check, then package the app.
#   2. CD job: deploy the package to the configured Azure App Service.
#
# Setup (one-time):
#   In your Azure App Service > "Get publish profile" -> download the XML.
#   In your GitHub repo:
#     Settings > Secrets and variables > Actions > New repository secret
#       Name:  AZURE_WEBAPP_PUBLISH_PROFILE
#       Value: paste the contents of the .PublishSettings file.
#   Update AZURE_WEBAPP_NAME below to match your App Service name.
#
name: Build and deploy GetNotes to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: getnotes-web-shafi
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '20.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Smoke check (server boots without runtime errors)
        # We can't run against real Azure here, so just sanity-check that
        # the entry file requires cleanly.
        run: node -e "require('./server.js'); setTimeout(() => process.exit(0), 1500)"
        env:
          NODE_ENV: test
          PORT: 0

      - name: Zip artifact for deployment
        # Exclude node_modules — App Service Oryx installs them fresh on the
        # server so there are no cross-platform binary mismatches.
        run: zip -r release.zip . -x "*.git*" "node_modules/*" "functions/*" "docs/*" "*.md"

      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
